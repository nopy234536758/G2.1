<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌍 GeoQuest – Frontières Réelles (stable)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #0b1a20;
            --surface: #132c36;
            --border: #2a4a58;
            --text: #eaf2f5;
            --accent: #4f9da6;
            --green: #2ecc71;
            --red: #e74c3c;
            --gold: #f1c40f;
            --radius: 24px;
            --shadow: 0 12px 28px rgba(0,0,0,0.6);
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        #app {
            max-width: 1500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            background: var(--surface);
            padding: 14px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .logo h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #f9e79f, #a8e6cf, #6ec4ce);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .mode-switch {
            display: flex;
            gap: 8px;
            background: #1c3e4a;
            padding: 6px;
            border-radius: 60px;
        }
        .mode-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            background: transparent;
            font-weight: 700;
            cursor: pointer;
            color: #9bb7c4;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: var(--accent);
            color: #0b1a20;
            box-shadow: 0 0 12px #4f9da6aa;
        }
        .difficulty-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1c3e4a;
            padding: 6px 20px;
            border-radius: 60px;
        }
        select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            background: var(--surface);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid var(--border);
        }
        .stat-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0d262f;
            padding: 6px 20px;
            border-radius: 50px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }
        .streak-fire { color: var(--gold); text-shadow: 0 0 5px orange; }
        .lives { color: var(--red); letter-spacing: 4px; }
        #map {
            height: 500px;
            width: 100%;
            background: #9ec5d4;
            cursor: crosshair;
            border-radius: var(--radius);
            border: 2px solid var(--border);
        }
        .game-panel {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
        }
        .target-box {
            background: linear-gradient(145deg, #1e4a5a, #0e2f3c);
            padding: 12px 32px;
            border-radius: 80px;
            border: 2px solid var(--accent);
            display: inline-block;
            margin-bottom: 20px;
        }
        .target-label {
            font-size: 36px;
            font-weight: 800;
            color: #f0f9ff;
            text-shadow: 0 3px 0 #0b1a20;
        }
        .feedback {
            padding: 18px 24px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            background: #1b3f4d;
            border-left: 8px solid var(--accent);
            margin: 20px 0;
        }
        .feedback.correct { border-left-color: var(--green); background: #1e4a3e; }
        .feedback.wrong { border-left-color: var(--red); background: #5a2e2e; }
        .btn {
            padding: 12px 28px;
            border-radius: 60px;
            border: none;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            background: #2c5e6e;
            color: white;
            border-bottom: 4px solid #14323e;
            margin: 5px;
        }
        .btn-primary { background: var(--accent); border-bottom-color: #2a6b75; color: #0b1a20; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000cc;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-content {
            background: var(--surface);
            border-radius: 32px;
            padding: 32px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid var(--accent);
        }
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .user-marker, .solution-star {
            border-radius: 50%;
            border: 3px solid white;
            text-align: center;
        }
        .user-marker { background: #3b5bdb; width: 24px !important; height: 24px !important; line-height: 22px; }
        .solution-star { background: gold; width: 32px !important; height: 32px !important; line-height: 30px; font-size: 24px; }
        .distance-tooltip { background: #0b1a20dd; border: none; color: white; font-weight: bold; padding: 4px 12px; border-radius: 20px; }
        .loading { text-align: center; padding: 20px; background: #1c3e4a; border-radius: 20px; }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <div class="logo"><h1>🗺️ GEOQUEST · FRONTIÈRES 100% FONCTIONNELLES</h1></div>
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="pays">🌍 Pays</button>
            <button class="mode-btn" data-mode="metropoles">🏙️ Métropoles</button>
            <button class="mode-btn" data-mode="mixte">🔀 Mixte</button>
        </div>
        <div class="difficulty-selector">
            <label>🎚️ DIFFICULTÉ</label>
            <select id="difficultySelect">
                <option value="1000">Débutant (1000 km)</option>
                <option value="700">Facile (700 km)</option>
                <option value="300" selected>Normal (300 km)</option>
                <option value="100">Difficile (100 km)</option>
                <option value="50">Expert (50 km)</option>
                <option value="10">Hardcore (10 km)</option>
                <option value="1">Impossible (1 km)</option>
            </select>
        </div>
        <button class="btn" id="showLeaderboardBtn">🏆 CLASSEMENT</button>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span>⭐</span><div><span class="stat-value" id="pointsDisplay">0</span><span> PTS</span></div></div>
        <div class="stat-card"><span>🔥</span><div><span class="stat-value streak-fire" id="streakDisplay">0</span><span> COMBO</span></div></div>
        <div class="stat-card"><span>❤️</span><div><span class="stat-value lives" id="livesDisplay">3</span><span> VIES</span></div></div>
        <div class="stat-card"><span>🏅</span><div><span class="stat-value" id="highScoreDisplay">0</span><span> RECORD</span></div></div>
        <div class="stat-card"><span>✅</span><div><span class="stat-value" id="correctCountDisplay">0</span><span> RÉUSSITES</span></div></div>
    </div>

    <div id="map"></div>

    <div class="game-panel">
        <div class="target-box"><span class="target-label" id="targetName">---</span></div>
        <div class="feedback" id="feedbackMessage">🌍 Chargement des frontières...</div>
        <div class="actions">
            <button class="btn" id="skipBtn">⏩ PASSER</button>
            <button class="btn btn-primary" id="nextBtn">▶️ SUIVANT</button>
            <button class="btn" id="newGameBtn">🔄 NOUVELLE PARTIE</button>
        </div>
        <div class="legend-tip" style="font-size:13px; margin-top:12px; text-align:center;">
            ⭐ Pays → clique n'importe où à l'intérieur de ses frontières.<br>
            📍 Métropole → clique à moins du seuil (distance au point).
        </div>
    </div>
</div>

<div class="modal" id="leaderboardModal">
    <div class="modal-content">
        <h2>🏆 HALL OF FAME</h2>
        <div id="leaderboardContent">Chargement...</div>
        <button class="close-btn" id="closeModalBtn">Fermer</button>
    </div>
</div>

<script>
    (function(){
        // ---------- LISTES DES CIBLES ----------
        const PAYS_NOMS_FR = [
            "Brésil", "Russie", "Inde", "Chine", "Afrique du Sud", "Mexique", "Argentine",
            "Pologne", "Nigéria", "Turquie", "Arabie Saoudite", "Pakistan", "Vietnam",
            "Thaïlande", "Malaisie", "Philippines", "Indonésie"
        ];
        // Correspondance français -> anglais pour le GeoJSON (basé sur le champ "ADMIN" du fichier countries.geo.json)
        const PAYS_MAP = {
            "Brésil": "Brazil", "Russie": "Russia", "Inde": "India", "Chine": "China",
            "Afrique du Sud": "South Africa", "Mexique": "Mexico", "Argentine": "Argentina",
            "Pologne": "Poland", "Nigéria": "Nigeria", "Turquie": "Turkey",
            "Arabie Saoudite": "Saudi Arabia", "Pakistan": "Pakistan", "Vietnam": "Vietnam",
            "Thaïlande": "Thailand", "Malaisie": "Malaysia", "Philippines": "Philippines",
            "Indonésie": "Indonesia"
        };

        const METROPOLES = [
            { name: "New York", lat: 40.7128, lng: -74.0060 },
            { name: "Londres", lat: 51.5074, lng: -0.1278 },
            { name: "Paris", lat: 48.8566, lng: 2.3522 },
            { name: "Shanghaï", lat: 31.2304, lng: 121.4737 },
            { name: "Tokyo", lat: 35.6895, lng: 139.6917 },
            { name: "Dubaï", lat: 25.2048, lng: 55.2708 },
            { name: "Sydney", lat: -33.8688, lng: 151.2093 },
            { name: "Hong-Kong", lat: 22.3193, lng: 114.1694 },
            { name: "Singapour", lat: 1.3521, lng: 103.8198 },
            { name: "Los Angeles", lat: 34.0522, lng: -118.2437 },
            { name: "Séoul", lat: 37.5665, lng: 126.9780 },
            { name: "Sao Paulo", lat: -23.5505, lng: -46.6333 },
            { name: "Milan", lat: 45.4642, lng: 9.1900 },
            { name: "Mumbaï", lat: 19.0760, lng: 72.8777 },
            { name: "Jakarta", lat: -6.2088, lng: 106.8456 }
        ];

        // ---------- ÉTAT JEU ----------
        let map;
        let currentMode = 'pays';
        let currentTarget = null;
        let clickEnabled = true;
        let isGameActive = true;
        let totalPoints = 0;
        let currentStreak = 0;
        let lives = 3;
        let correctAnswers = 0;
        let currentHighScore = 0;

        let countryGeometries = new Map(); // nom anglais -> feature (polygone)

        // Éléments DOM
        const targetNameEl = document.getElementById('targetName');
        const pointsDisplay = document.getElementById('pointsDisplay');
        const streakDisplay = document.getElementById('streakDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const correctCountSpan = document.getElementById('correctCountDisplay');
        const feedbackEl = document.getElementById('feedbackMessage');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const difficultySelect = document.getElementById('difficultySelect');
        const skipBtn = document.getElementById('skipBtn');
        const nextBtn = document.getElementById('nextBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const showLeaderboardBtn = document.getElementById('showLeaderboardBtn');
        const modal = document.getElementById('leaderboardModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const leaderboardContent = document.getElementById('leaderboardContent');

        function getThreshold() { return parseFloat(difficultySelect.value); }
        function getBasePoints() {
            const t = getThreshold();
            if (t >= 1000) return 10;
            if (t >= 700) return 15;
            if (t >= 300) return 25;
            if (t >= 100) return 50;
            if (t >= 50) return 85;
            if (t >= 10) return 160;
            return 350;
        }
        function getStreakMultiplier() { return Math.min(1 + currentStreak * 0.12, 3.0); }

        function updateUI() {
            pointsDisplay.textContent = totalPoints;
            streakDisplay.textContent = currentStreak;
            livesDisplay.textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
            correctCountSpan.textContent = correctAnswers;
            highScoreDisplay.textContent = currentHighScore;
        }

        function loadHighScore() {
            const key = `hs_${currentMode}_${getThreshold()}`;
            currentHighScore = parseInt(localStorage.getItem(key)) || 0;
            highScoreDisplay.textContent = currentHighScore;
        }
        function saveHighScore() {
            if (totalPoints > currentHighScore) {
                currentHighScore = totalPoints;
                localStorage.setItem(`hs_${currentMode}_${getThreshold()}`, currentHighScore);
                highScoreDisplay.textContent = currentHighScore;
                feedbackEl.innerHTML = `🏆 NOUVEAU RECORD ! ${totalPoints} points ! 🏆`;
                setTimeout(() => { if(isGameActive && currentTarget) refreshFeedback(); }, 2000);
            }
        }
        function saveLeaderboard() {
            if (totalPoints === 0) return;
            const key = `lb_${currentMode}_${getThreshold()}`;
            let scores = JSON.parse(localStorage.getItem(key)) || [];
            scores.push({ points: totalPoints, date: new Date().toLocaleDateString(), correct: correctAnswers });
            scores.sort((a,b) => b.points - a.points);
            scores = scores.slice(0, 10);
            localStorage.setItem(key, JSON.stringify(scores));
        }
        function displayLeaderboard() {
            let html = '';
            const modes = ['pays', 'metropoles', 'mixte'];
            const diffs = ['1000','700','300','100','50','10','1'];
            for (let diff of diffs) {
                for (let mode of modes) {
                    const key = `lb_${mode}_${diff}`;
                    const data = JSON.parse(localStorage.getItem(key)) || [];
                    if (data.length) {
                        html += `<h3>${mode.toUpperCase()} · seuil ${diff} km</h3><table class="leaderboard-table"><tr><th>Score</th><th>Réussites</th><th>Date</th></tr>`;
                        data.slice(0,5).forEach(e => {
                            html += `<tr><td>${e.points}</td><td>${e.correct}</td><td>${e.date}</td></tr>`;
                        });
                        html += `</table><br>`;
                    }
                }
            }
            leaderboardContent.innerHTML = html || '<p>Aucun score. Joue pour entrer au Hall of Fame !</p>';
        }

        function refreshFeedback() {
            if(currentTarget)
                feedbackEl.innerHTML = `🎯 Où se trouve ${currentTarget.name} ? ${currentTarget.type === 'pays' ? '(Clique dans le pays)' : `(Seuil ${getThreshold()} km)`}`;
        }

        // ---------- CHARGEMENT DES FRONTIÈRES (source fiable) ----------
        async function loadCountries() {
            feedbackEl.innerHTML = "⏳ Chargement des frontières (GeoJSON) depuis CDN...";
            try {
                // Utilisation du CDN jsDelivr (fiable et CORS-friendly)
                const response = await fetch('https://cdn.jsdelivr.net/npm/world-geojson@1.0.0/countries.geo.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                // Indexer par nom ADMIN
                for (let feature of data.features) {
                    const name = feature.properties.ADMIN; // "France", "Brazil", etc.
                    countryGeometries.set(name, feature);
                }
                feedbackEl.innerHTML = "✅ Frontières chargées avec succès ! Prêt à jouer.";
                setTimeout(() => refreshFeedback(), 1500);
                pickNewTarget(); // première cible
            } catch(e) {
                console.error(e);
                feedbackEl.innerHTML = "⚠️ ERREUR : impossible de charger les frontières. Vérifie ta connexion internet. Rafraîchis la page.";
                // On peut quand même jouer en mode métropoles uniquement, mais pour les pays ce sera cassé.
                // On désactive le mode pays si pas de géométries
                if (countryGeometries.size === 0) {
                    feedbackEl.innerHTML += " <br>▶️ Mode pays désactivé (frontières manquantes). Passe en mode Métropoles.";
                }
            }
        }

        function isPointInCountry(lat, lng, paysFr) {
            const englishName = PAYS_MAP[paysFr];
            if (!englishName) return false;
            const feature = countryGeometries.get(englishName);
            if (!feature) return false;
            const point = turf.point([lng, lat]);
            return turf.booleanPointInPolygon(point, feature.geometry);
        }

        // ---------- CIBLES ----------
        function pickNewTarget() {
            if (!isGameActive) return;
            // Nettoyer marqueurs
            if (window.userMarker) map.removeLayer(window.userMarker);
            if (window.solutionMarker) map.removeLayer(window.solutionMarker);
            if (window.distanceLine) map.removeLayer(window.distanceLine);
            
            let pool = [];
            if (currentMode === 'pays') {
                if (countryGeometries.size === 0) {
                    feedbackEl.innerHTML = "⚠️ Frontières non chargées, impossible de jouer en mode pays. Recharge la page ou passe en métropoles.";
                    return;
                }
                pool = PAYS_NOMS_FR.map(n => ({ type: 'pays', name: n }));
            } else if (currentMode === 'metropoles') {
                pool = METROPOLES.map(c => ({ type: 'ville', name: c.name, lat: c.lat, lng: c.lng }));
            } else { // mixte
                let paysItems = PAYS_NOMS_FR.map(n => ({ type: 'pays', name: n }));
                let villesItems = METROPOLES.map(c => ({ type: 'ville', name: c.name, lat: c.lat, lng: c.lng }));
                pool = [...paysItems, ...villesItems];
            }
            const rand = pool[Math.floor(Math.random() * pool.length)];
            if (rand.type === 'pays') {
                currentTarget = { type: 'pays', name: rand.name };
            } else {
                currentTarget = { type: 'ville', name: rand.name, lat: rand.lat, lng: rand.lng };
            }
            targetNameEl.textContent = currentTarget.name;
            refreshFeedback();
            clickEnabled = true;
            map.setView([20, 0], 2);
        }

        // ---------- CLIC ----------
        function onMapClick(e) {
            if (!isGameActive) {
                feedbackEl.innerHTML = "💀 Partie terminée. Nouvelle partie.";
                return;
            }
            if (!clickEnabled) {
                feedbackEl.innerHTML = "⏳ Utilise Suivant ou Passer pour continuer.";
                return;
            }
            if (!currentTarget) { pickNewTarget(); return; }

            const { lat, lng } = e.latlng;
            let isCorrect = false;
            let distance = null;
            let details = "";

            if (currentTarget.type === 'pays') {
                // Vérification par frontière
                isCorrect = isPointInCountry(lat, lng, currentTarget.name);
                details = isCorrect ? `✅ ${currentTarget.name} trouvé !` : `❌ ${currentTarget.name} n'est pas à cet endroit.`;
            } else {
                const targetLat = currentTarget.lat, targetLng = currentTarget.lng;
                distance = turf.distance(turf.point([lng, lat]), turf.point([targetLng, targetLat]), { units: 'kilometers' });
                isCorrect = distance <= getThreshold();
                details = isCorrect ? `✅ ${currentTarget.name} à ${Math.round(distance)} km` : `❌ ${currentTarget.name} est à ${Math.round(distance)} km (seuil ${getThreshold()} km)`;
            }

            // Affichage marqueurs
            if (window.userMarker) map.removeLayer(window.userMarker);
            if (window.solutionMarker) map.removeLayer(window.solutionMarker);
            if (window.distanceLine) map.removeLayer(window.distanceLine);

            window.userMarker = L.marker([lat, lng], { icon: L.divIcon({ className: 'user-marker', html: '📍', iconSize: [24,24] }) }).addTo(map);
            
            if (currentTarget.type === 'ville') {
                const starIcon = L.divIcon({ className: 'solution-star', html: '⭐', iconSize: [28,28] });
                window.solutionMarker = L.marker([currentTarget.lat, currentTarget.lng], { icon: starIcon }).addTo(map);
                const pts = [[lat, lng], [currentTarget.lat, currentTarget.lng]];
                window.distanceLine = L.polyline(pts, { color: isCorrect ? '#2ecc71' : '#e74c3c', weight: 3, dashArray: isCorrect ? null : '8,6' }).addTo(map);
                window.distanceLine.bindTooltip(`${Math.round(distance)} km`, { permanent: true, direction: 'center', className: 'distance-tooltip' });
                map.setView([currentTarget.lat, currentTarget.lng], Math.max(map.getZoom(), 4));
            } else {
                // Pour un pays, on centre sur le clic
                map.setView([lat, lng], map.getZoom());
            }

            clickEnabled = false;

            if (isCorrect) {
                let base = (currentTarget.type === 'pays') ? 30 : getBasePoints();
                let multiplier = getStreakMultiplier();
                let earned = Math.floor(base * multiplier);
                totalPoints += earned;
                currentStreak++;
                correctAnswers++;
                feedbackEl.className = 'feedback correct';
                feedbackEl.innerHTML = `${details} +${earned} pts (x${multiplier.toFixed(1)}) 🔥 Combo ${currentStreak}`;
                updateUI();
                saveHighScore();
            } else {
                lives--;
                currentStreak = 0;
                feedbackEl.className = 'feedback wrong';
                feedbackEl.innerHTML = `${details} ❌ Combo perdu ! ❤️ restantes : ${lives}`;
                updateUI();
                if (lives <= 0) {
                    isGameActive = false;
                    clickEnabled = false;
                    saveLeaderboard();
                    saveHighScore();
                    feedbackEl.className = 'feedback gameover';
                    feedbackEl.innerHTML = `💀 GAME OVER 💀 Score final : ${totalPoints} points | Réussites : ${correctAnswers}<br>Appuie sur "Nouvelle Partie".`;
                }
            }
            if (isCorrect) {
                const streakSpan = document.getElementById('streakDisplay');
                streakSpan.classList.add('combo-pop');
                setTimeout(() => streakSpan.classList.remove('combo-pop'), 300);
            }
        }

        function resetGame() {
            totalPoints = 0;
            currentStreak = 0;
            lives = 3;
            correctAnswers = 0;
            isGameActive = true;
            clickEnabled = true;
            updateUI();
            loadHighScore();
            pickNewTarget();
            feedbackEl.className = 'feedback';
            feedbackEl.innerHTML = "✨ Nouvelle partie ! Clique sur la carte. ✨";
            if (window.userMarker) map.removeLayer(window.userMarker);
            if (window.solutionMarker) map.removeLayer(window.solutionMarker);
            if (window.distanceLine) map.removeLayer(window.distanceLine);
            window.userMarker = window.solutionMarker = window.distanceLine = null;
        }

        function setMode(mode) {
            currentMode = mode;
            modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
            resetGame();
        }

        function initMap() {
            map = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB',
                subdomains: 'abcd'
            }).addTo(map);
            map.on('click', onMapClick);
        }

        function bindEvents() {
            modeBtns.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
            difficultySelect.addEventListener('change', () => resetGame());
            skipBtn.addEventListener('click', () => { if(isGameActive) pickNewTarget(); });
            nextBtn.addEventListener('click', () => { if(isGameActive) pickNewTarget(); });
            newGameBtn.addEventListener('click', resetGame);
            showLeaderboardBtn.addEventListener('click', () => { displayLeaderboard(); modal.style.display = 'flex'; });
            closeModalBtn.addEventListener('click', () => modal.style.display = 'none');
            window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
        }

        // Démarrage
        initMap();
        bindEvents();
        loadCountries(); // charge les frontières puis lance pickNewTarget
    })();
</script>
</body>
</html>
