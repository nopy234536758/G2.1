<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌍 GeoQuest – Révision G2.1</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Turf.js -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #0b1a20;
            --surface: #132c36;
            --border: #2a4a58;
            --text: #eaf2f5;
            --muted: #9bb7c4;
            --accent: #4f9da6;
            --accent-light: #6ec4ce;
            --green: #2ecc71;
            --red: #e74c3c;
            --gold: #f1c40f;
            --radius: 20px;
            --shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        #app {
            max-width: 1500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Header gaming */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            background: var(--surface);
            padding: 16px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #a8e6cf, #d4edf5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .mode-switch {
            display: flex;
            gap: 8px;
            background: #1c3e4a;
            padding: 5px;
            border-radius: 50px;
        }
        .mode-btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            color: var(--muted);
            transition: 0.2s;
        }
        .mode-btn.active {
            background: var(--accent);
            color: #0b1a20;
            box-shadow: 0 0 10px #4f9da6aa;
        }
        .difficulty-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1c3e4a;
            padding: 5px 15px;
            border-radius: 40px;
        }
        .difficulty-selector label {
            color: var(--muted);
            font-weight: 500;
        }
        select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }
        .frontier-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .frontier-toggle label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Carte */
        #map-container {
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px solid var(--border);
            box-shadow: var(--shadow);
        }
        #map {
            height: 520px;
            width: 100%;
            background: #9ec5d4;
            cursor: crosshair;
        }

        /* Panneau de jeu */
        .game-panel {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .target-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .target-box {
            background: linear-gradient(145deg, #1e4a5a, #0e2f3c);
            padding: 16px 36px;
            border-radius: 80px;
            border: 2px solid var(--accent-light);
            box-shadow: inset 0 2px 5px #00000033, 0 6px 0 #0b1a20;
        }
        .target-label {
            font-size: 38px;
            font-weight: 800;
            color: #f0f9ff;
            text-shadow: 0 4px 0 #0b1a20;
            letter-spacing: 1px;
        }
        .score-panel {
            display: flex;
            gap: 20px;
        }
        .score-badge {
            background: #1b3f4d;
            border-radius: 50px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
        }
        .score-icon { font-size: 24px; }
        .score-value {
            font-size: 28px;
            font-weight: 800;
        }
        .score-good .score-value { color: var(--green); }
        .score-bad .score-value { color: var(--red); }

        .feedback {
            padding: 16px 22px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            background: #1b3f4d;
            border-left: 8px solid var(--accent);
            box-shadow: inset 0 2px 5px #00000033;
            min-height: 70px;
            display: flex;
            align-items: center;
        }
        .feedback.correct { border-left-color: var(--green); background: #1e4a3e; }
        .feedback.wrong { border-left-color: var(--red); background: #5a2e2e; }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }
        .btn {
            padding: 14px 28px;
            border-radius: 60px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.15s;
            background: #2c5e6e;
            color: white;
            border-bottom: 4px solid #14323e;
            box-shadow: 0 4px 8px #00000040;
        }
        .btn-primary {
            background: var(--accent);
            border-bottom-color: #2a6b75;
            color: #0b1a20;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: translateY(2px); box-shadow: none; }

        .leaderboard-btn {
            background: transparent;
            border: 2px dashed var(--muted);
            color: var(--muted);
            padding: 8px 18px;
        }

        /* Leaderboard modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000cc;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-content {
            background: var(--surface);
            border-radius: 32px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            border: 2px solid var(--accent);
        }
        .modal-content h2 { color: var(--gold); margin-bottom: 20px; }
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .close-btn {
            margin-top: 20px;
            background: var(--accent);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .legend-tip {
            font-size: 14px;
            color: var(--muted);
            display: flex;
            gap: 20px;
        }

        /* Animation pulse */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(2); opacity: 0; }
        }
        .pulse-marker {
            animation: pulse 1.2s ease-out;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <div class="logo">
            <h1>🗺️ GEOQUEST · G2.1</h1>
        </div>
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="pays">🌍 Pays</button>
            <button class="mode-btn" data-mode="metropoles">🏙️ Métropoles</button>
            <button class="mode-btn" data-mode="mixte">🔀 Mixte</button>
        </div>
        <div class="difficulty-selector">
            <label>🎚️ Difficulté</label>
            <select id="difficultySelect">
                <option value="1000">Débutant (1000 km)</option>
                <option value="700">Facile (700 km)</option>
                <option value="300" selected>Normal (300 km)</option>
                <option value="100">Difficile (100 km)</option>
                <option value="50">Expert (50 km)</option>
                <option value="10">Hardcore (10 km)</option>
                <option value="1">Impossible (1 km)</option>
            </select>
        </div>
        <div class="frontier-toggle">
            <label>
                <input type="checkbox" id="frontierCheckbox" checked> 🧭 Frontières
            </label>
            <button class="btn leaderboard-btn" id="showLeaderboardBtn">🏆 Classement</button>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div class="game-panel">
        <div class="target-area">
            <div class="target-box">
                <span class="target-label" id="targetName">---</span>
            </div>
            <div class="score-panel">
                <div class="score-badge score-good">
                    <span class="score-icon">✅</span>
                    <span class="score-value" id="scoreGood">0</span>
                </div>
                <div class="score-badge score-bad">
                    <span class="score-icon">❌</span>
                    <span class="score-value" id="scoreBad">0</span>
                </div>
            </div>
        </div>

        <div class="feedback" id="feedbackMessage">
            🎯 Prêt ? Clique sur la carte !
        </div>

        <div class="actions">
            <button class="btn" id="skipBtn">⏩ Passer</button>
            <button class="btn btn-primary" id="nextBtn">▶️ Suivant</button>
        </div>
        <div class="legend-tip">
            <span>⭐ Trait + distance après validation</span>
            <span id="frontierWarning" style="color:#e67e22;"></span>
        </div>
    </div>
</div>

<!-- Modal Leaderboard -->
<div class="modal" id="leaderboardModal">
    <div class="modal-content">
        <h2>🏅 Meilleurs scores</h2>
        <div id="leaderboardContent">Chargement...</div>
        <button class="close-btn" id="closeModalBtn">Fermer</button>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- DONNÉES ----------
        const METROPOLES = [
            { name: "New York", lat: 40.7128, lng: -74.0060 },
            { name: "Londres", lat: 51.5074, lng: -0.1278 },
            { name: "Paris", lat: 48.8566, lng: 2.3522 },
            { name: "Shanghaï", lat: 31.2304, lng: 121.4737 },
            { name: "Tokyo", lat: 35.6895, lng: 139.6917 },
            { name: "Dubaï", lat: 25.2048, lng: 55.2708 },
            { name: "Beijing", lat: 39.9042, lng: 116.4074 },
            { name: "Sydney", lat: -33.8688, lng: 151.2093 },
            { name: "Hong-Kong", lat: 22.3193, lng: 114.1694 },
            { name: "Singapour", lat: 1.3521, lng: 103.8198 },
            { name: "Los Angeles", lat: 34.0522, lng: -118.2437 },
            { name: "Chicago", lat: 41.8781, lng: -87.6298 },
            { name: "Séoul", lat: 37.5665, lng: 126.9780 },
            { name: "Moscou", lat: 55.7558, lng: 37.6173 },
            { name: "Sao Paulo", lat: -23.5505, lng: -46.6333 },
            { name: "Milan", lat: 45.4642, lng: 9.1900 },
            { name: "Mexico", lat: 19.4326, lng: -99.1332 },
            { name: "Mumbaï", lat: 19.0760, lng: 72.8777 },
            { name: "Jakarta", lat: -6.2088, lng: 106.8456 }
        ];

        const PAYS_LIST = [
            { nameFr: "Brésil", nameEn: "Brazil" },
            { nameFr: "Russie", nameEn: "Russia" },
            { nameFr: "Inde", nameEn: "India" },
            { nameFr: "Chine", nameEn: "China" },
            { nameFr: "Afrique du Sud", nameEn: "South Africa" },
            { nameFr: "Mexique", nameEn: "Mexico" },
            { nameFr: "Argentine", nameEn: "Argentina" },
            { nameFr: "Pologne", nameEn: "Poland" },
            { nameFr: "Nigéria", nameEn: "Nigeria" },
            { nameFr: "Turquie", nameEn: "Turkey" },
            { nameFr: "Arabie Saoudite", nameEn: "Saudi Arabia" },
            { nameFr: "Pakistan", nameEn: "Pakistan" },
            { nameFr: "Vietnam", nameEn: "Vietnam" },
            { nameFr: "Thaïlande", nameEn: "Thailand" },
            { nameFr: "Malaisie", nameEn: "Malaysia" },
            { nameFr: "Philippines", nameEn: "Philippines" },
            { nameFr: "Indonésie", nameEn: "Indonesia" }
        ];

        // ---------- VARIABLES ----------
        let map;
        let frontierLayer;
        let countriesGeoJson = null;
        let currentMode = 'pays';       // 'pays', 'metropoles', 'mixte'
        let currentTarget = null;
        let userMarker = null;
        let solutionLayer = null;
        let distanceLine = null;        // Ligne entre clic et solution
        let clickEnabled = true;
        let scoreGood = 0;
        let scoreBad = 0;
        let sessionScore = 0;           // pour le leaderboard (somme good)

        // Éléments DOM
        const targetNameEl = document.getElementById('targetName');
        const scoreGoodEl = document.getElementById('scoreGood');
        const scoreBadEl = document.getElementById('scoreBad');
        const feedbackEl = document.getElementById('feedbackMessage');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const frontierCheck = document.getElementById('frontierCheckbox');
        const difficultySelect = document.getElementById('difficultySelect');
        const skipBtn = document.getElementById('skipBtn');
        const nextBtn = document.getElementById('nextBtn');
        const showLeaderboardBtn = document.getElementById('showLeaderboardBtn');
        const modal = document.getElementById('leaderboardModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const leaderboardContent = document.getElementById('leaderboardContent');
        const frontierWarning = document.getElementById('frontierWarning');

        // Seuil de distance selon difficulté
        function getThreshold() {
            return parseFloat(difficultySelect.value);
        }

        // Mise à jour affichage frontières selon difficulté
        function updateFrontierRestriction() {
            const threshold = getThreshold();
            const hardModes = threshold <= 100; // Difficile et plus
            if (hardModes) {
                frontierCheck.checked = false;
                frontierCheck.disabled = true;
                frontierWarning.textContent = '⚠️ Frontières désactivées (niveau Difficile+)';
                if (frontierLayer) map.removeLayer(frontierLayer);
            } else {
                frontierCheck.disabled = false;
                frontierWarning.textContent = '';
                // respecter la checkbox
                if (frontierCheck.checked && frontierLayer) {
                    if (!map.hasLayer(frontierLayer)) frontierLayer.addTo(map);
                } else if (frontierLayer) {
                    if (map.hasLayer(frontierLayer)) map.removeLayer(frontierLayer);
                }
            }
        }

        // Carte
        function initMap() {
            map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                minZoom: 2,
                maxZoom: 8,
                zoomControl: true
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            // Chargement GeoJSON
            fetch('https://cdn.jsdelivr.net/npm/world-geojson@1.0.0/countries.geo.json')
                .then(res => res.json())
                .then(data => {
                    countriesGeoJson = data;
                    frontierLayer = L.geoJSON(data, {
                        style: { color: '#c9ae74', weight: 1.5, opacity: 0.8, fill: false },
                        interactive: false
                    });
                    if (frontierCheck.checked && !frontierCheck.disabled) {
                        frontierLayer.addTo(map);
                    }
                    // Si on attendait pour pick target
                    if (!currentTarget) pickNewTarget();
                })
                .catch(err => {
                    console.warn("GeoJSON non chargé", err);
                    feedbackEl.innerHTML = '⚠️ Données frontières indisponibles, mode Pays dégradé.';
                });

            map.on('click', onMapClick);
        }

        // Clic utilisateur
        function onMapClick(e) {
            if (!clickEnabled) {
                feedbackEl.innerHTML = '⏳ Valide ou passe à la suite.';
                return;
            }
            if (!currentTarget) { pickNewTarget(); return; }

            const { lat, lng } = e.latlng;
            const threshold = getThreshold();
            let isCorrect = false;
            let feedbackText = '';
            let distance = null;

            // Marqueur utilisateur
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([lat, lng], {
                icon: L.divIcon({ className: 'user-marker', html: '📍', iconSize: [24,24] })
            }).addTo(map);

            // Nettoyer anciens
            if (solutionLayer) map.removeLayer(solutionLayer);
            if (distanceLine) map.removeLayer(distanceLine);

            if (currentMode === 'pays' || (currentMode === 'mixte' && currentTarget.type === 'pays')) {
                // Mode pays
                const feature = currentTarget.countryFeature;
                if (!feature) {
                    feedbackText = '❌ Pays non trouvé.';
                    isCorrect = false;
                } else {
                    const point = turf.point([lng, lat]);
                    isCorrect = turf.booleanPointInPolygon(point, feature);
                    if (isCorrect) {
                        feedbackText = `✅ Parfait ! ${currentTarget.name}`;
                        scoreGood++;
                    } else {
                        feedbackText = `❌ Ce n'est pas ${currentTarget.name}.`;
                        scoreBad++;
                    }
                    // Afficher le pays correct
                    solutionLayer = L.geoJSON(feature, {
                        style: { color: '#2ecc71', weight: 3, fillColor: '#2ecc71', fillOpacity: 0.25 }
                    }).addTo(map);
                    map.fitBounds(solutionLayer.getBounds(), { padding: [30,30], maxZoom: 5 });
                }
            } else {
                // Mode métropole (ou mixte métropole)
                const targetLat = currentTarget.lat;
                const targetLng = currentTarget.lng;
                distance = getDistanceKm(lat, lng, targetLat, targetLng);
                isCorrect = distance <= threshold;

                // Étoile solution
                const starIcon = L.divIcon({ className: 'solution-star', html: '⭐', iconSize: [28,28] });
                solutionLayer = L.marker([targetLat, targetLng], { icon: starIcon }).addTo(map);
                solutionLayer.bindPopup(`${currentTarget.name}`).openPopup();

                // Ligne + distance
                const points = [[lat, lng], [targetLat, targetLng]];
                distanceLine = L.polyline(points, {
                    color: isCorrect ? '#2ecc71' : '#e74c3c',
                    weight: 3,
                    dashArray: isCorrect ? null : '8, 6',
                    className: 'distance-line'
                }).addTo(map);
                // Tooltip avec distance
                distanceLine.bindTooltip(`${Math.round(distance)} km`, { permanent: true, direction: 'center', className: 'distance-tooltip' });

                if (isCorrect) {
                    feedbackText = `✅ Correct ! Distance: ${Math.round(distance)} km`;
                    scoreGood++;
                } else {
                    feedbackText = `❌ Écart: ${Math.round(distance)} km (seuil ${threshold} km)`;
                    scoreBad++;
                }
                map.setView([targetLat, targetLng], map.getZoom() > 4 ? map.getZoom() : 4);
            }

            // Mise à jour UI
            feedbackEl.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
            feedbackEl.innerHTML = feedbackText;
            updateScore();
            clickEnabled = false;

            // Sauvegarde leaderboard potentielle en fin de session? On le fera plus tard.
        }

        function getDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function pickNewTarget() {
            if (userMarker) map.removeLayer(userMarker);
            if (solutionLayer) map.removeLayer(solutionLayer);
            if (distanceLine) map.removeLayer(distanceLine);
            userMarker = null; solutionLayer = null; distanceLine = null;

            // Déterminer le type selon mode
            let pool = [];
            if (currentMode === 'pays') pool = PAYS_LIST.map(p => ({ ...p, type: 'pays' }));
            else if (currentMode === 'metropoles') pool = METROPOLES.map(m => ({ ...m, type: 'metropole' }));
            else { // mixte
                pool = [
                    ...PAYS_LIST.map(p => ({ ...p, type: 'pays' })),
                    ...METROPOLES.map(m => ({ ...m, type: 'metropole' }))
                ];
            }

            const rand = pool[Math.floor(Math.random() * pool.length)];
            if (rand.type === 'pays') {
                const feature = findCountryFeature(rand.nameEn);
                currentTarget = {
                    name: rand.nameFr,
                    type: 'pays',
                    countryFeature: feature
                };
            } else {
                currentTarget = {
                    name: rand.name,
                    type: 'metropole',
                    lat: rand.lat,
                    lng: rand.lng
                };
            }

            targetNameEl.textContent = currentTarget.name;
            feedbackEl.className = 'feedback';
            feedbackEl.innerHTML = `🔍 Localise : ${currentTarget.name}`;
            clickEnabled = true;
            map.setView([20, 0], 2);
        }

        function findCountryFeature(nameEn) {
            if (!countriesGeoJson) return null;
            return countriesGeoJson.features.find(f => 
                f.properties?.name === nameEn || f.properties?.admin === nameEn
            );
        }

        function updateScore() {
            scoreGoodEl.textContent = scoreGood;
            scoreBadEl.textContent = scoreBad;
        }

        // Changement mode
        function setMode(mode) {
            currentMode = mode;
            modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
            resetGame();
        }

        function resetGame() {
            scoreGood = 0; scoreBad = 0;
            updateScore();
            pickNewTarget();
        }

        // Leaderboard
        function saveScoreToLeaderboard() {
            if (scoreGood === 0) return;
            const key = `geoquest_${currentMode}_${difficultySelect.value}`;
            const entry = {
                score: scoreGood,
                date: new Date().toLocaleDateString(),
                mode: currentMode,
                diff: difficultySelect.options[difficultySelect.selectedIndex].text
            };
            let scores = JSON.parse(localStorage.getItem(key)) || [];
            scores.push(entry);
            scores.sort((a,b) => b.score - a.score);
            scores = scores.slice(0, 10);
            localStorage.setItem(key, JSON.stringify(scores));
        }

        function displayLeaderboard() {
            let html = '';
            const modes = ['pays', 'metropoles', 'mixte'];
            const diffs = ['1000','700','300','100','50','10','1'];
            diffs.forEach(diff => {
                modes.forEach(mode => {
                    const key = `geoquest_${mode}_${diff}`;
                    const data = JSON.parse(localStorage.getItem(key)) || [];
                    if (data.length > 0) {
                        html += `<h3>${mode.toUpperCase()} · seuil ${diff} km</h3>`;
                        html += `<table class="leaderboard-table"><tr><th>Score</th><th>Date</th></tr>`;
                        data.slice(0,5).forEach(e => {
                            html += `<tr><td>${e.score}</td><td>${e.date}</td></tr>`;
                        });
                        html += `</table><br>`;
                    }
                });
            });
            if (html === '') html = '<p>Aucun score enregistré. Joue pour apparaître ici !</p>';
            leaderboardContent.innerHTML = html;
        }

        // Événements
        function init() {
            initMap();
            pickNewTarget();

            modeBtns.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
            difficultySelect.addEventListener('change', () => {
                updateFrontierRestriction();
                // Réinitialiser la partie en cours? On garde le score, mais on peut reset
                // Pour éviter triche, on reset
                resetGame();
            });
            frontierCheck.addEventListener('change', () => {
                if (frontierCheck.disabled) return;
                if (frontierCheck.checked) {
                    if (frontierLayer && !map.hasLayer(frontierLayer)) frontierLayer.addTo(map);
                } else {
                    if (frontierLayer) map.removeLayer(frontierLayer);
                }
            });
            skipBtn.addEventListener('click', () => { pickNewTarget(); });
            nextBtn.addEventListener('click', () => {
                // Sauvegarder score avant nouvelle question ? Non on sauvegarde à la fin de session.
                pickNewTarget();
            });

            // Leaderboard
            showLeaderboardBtn.addEventListener('click', () => {
                displayLeaderboard();
                modal.style.display = 'flex';
            });
            closeModalBtn.addEventListener('click', () => modal.style.display = 'none');
            window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

            // Sauvegarde automatique à chaque bonne réponse? On peut sauvegarder quand on quitte ou après chaque partie.
            // Pour simplifier, on sauvegarde quand le score change (après validation)
            const originalUpdate = updateScore;
            updateScore = function() {
                originalUpdate();
                if (scoreGood > 0) saveScoreToLeaderboard();
            };
            updateScore();

            // Styles additionnels
            const style = document.createElement('style');
            style.innerHTML = `
                .user-marker {
                    background: #3b5bdb;
                    border-radius: 50%;
                    width: 24px !important;
                    height: 24px !important;
                    border: 3px solid white;
                    box-shadow: 0 0 15px #3b5bdb;
                    font-size: 18px;
                    line-height: 22px;
                    text-align: center;
                    color: white;
                }
                .solution-star {
                    background: #f1c40f;
                    border-radius: 50%;
                    width: 32px !important;
                    height: 32px !important;
                    border: 3px solid #2ecc71;
                    box-shadow: 0 0 20px gold;
                    font-size: 24px;
                    line-height: 30px;
                    text-align: center;
                }
                .distance-tooltip {
                    background: #0b1a20dd;
                    border: none;
                    color: white;
                    font-weight: bold;
                    padding: 4px 10px;
                    border-radius: 20px;
                    font-size: 14px;
                    box-shadow: 0 2px 8px black;
                }
            `;
            document.head.appendChild(style);
            updateFrontierRestriction();
        }

        init();
    })();
</script>
</body>
</html>
